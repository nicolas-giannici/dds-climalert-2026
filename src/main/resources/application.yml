weatherapi:
  api-key: "${WEATHERAPI_API_KEY:apikey}"
  base-url: "${WEATHERAPI_BASE_URL:https://api.weatherapi.com/v1}"
  location: "${WEATHERAPI_LOCATION:CABA}"

spring:
  datasource:
    url: "${DB_URL:jdbc:h2:file:./data/climalertdb}"
    driver-class-name: "org.h2.Driver"
    username: "${DB_USERNAME:sa}"
    password: "${DB_PASSWORD:}"
  jpa:
    database-platform: "org.hibernate.dialect.H2Dialect"
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  mail:
    host: "${SMTP_HOST:smtp-relay.brevo.com}"
    port: "${SMTP_PORT:587}"
    username: "${SMTP_USERNAME:smtp}"
    password: "${SMTP_PASSWORD:smtppassword}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

climalert:
  destinatarios: "${CLIMALERT_DESTINATARIOS:emergencias@clima.com}"
